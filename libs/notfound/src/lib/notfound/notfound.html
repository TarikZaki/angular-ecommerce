<section class="section-style">

        alt="Page not found illustration"
        class="w-full max-w-md mx-auto mb-8"
      />
      <span class="text-5xl sm:text-6xl font-bold text-green-600 block mb-4"

      >

      <div

      >
        <lib-button class="w-full sm:flex-1" routerLink="/home">

        </lib-button>
        <lib-button class="w-full sm:flex-1" routerLink="/products">

        </lib-button>
