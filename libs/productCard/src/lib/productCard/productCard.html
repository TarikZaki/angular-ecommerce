<mat-card class="card cursor-pointer mx-auto" appearance="outlined">
  <mat-card-header>
    <div
      mat-card-avatar
      class="bg-cover"
      [style.background-image]="'url('+product().brand. image"
    ></div>
    <mat-card-title>
      <span class="text-sm">{{ product().category.name }}</span></mat-card-title
    >
    <mat-card-subtitle>{{product().brand.name}}</mat-card-subtitle>
  </mat-card-header>
  <div class="relative">
    <img
      mat-card-image
      [src]="product().imageCover"
      [alt]="product().title"
      class="rounded-none"
    />
  </div>
  <mat-card-content>
    <p class="line-clamp-1 mb-2">{{ product().title }}</p>
    <div class="flex justify-between">
      <span>${{product().price}} EGP</span>
      <span
        ><i class="fa-solid fa-star text-yellow-300"></i>
        {{product().ratingsAverage}}</span
      >
    </div>
  </mat-card-content>
  <mat-card-actions>
    <lib-button class="w-full">Add to cart</lib-button>
  </mat-card-actions>
</mat-card>
