<mat-card class="card cursor-pointer mx-auto" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="bg-cover">
      <img [src]="product().category.image" class="rounded-full" alt="" />
    </div>
    <mat-card-title>
      <span class="text-sm">{{ product().category.name }}</span></mat-card-title
    >
    <mat-card-subtitle>{{product().brand.name}}</mat-card-subtitle>
  </mat-card-header>
  <div class="relative">
    <div [routerLink]="['/details', product().slug, product()._id]">
      <img
        mat-card-image
        [src]="product().imageCover"
        [alt]="product().title"
        class="rounded-none"
      />
    </div>
    <div class="absolute bottom-2 right-2 text-xs px-2 py-1 rounded">
      @if (localCartProduct().has(product()._id)) {
      <lib-product-controls
        [productId]="product()._id"
        [count]="getProductCount(product()._id)"
      ></lib-product-controls>

      }@else{
      <button (click)="addToCart(product()._id)">
        <i class="fa-solid fa-cart-plus text-xl"></i>
      </button>
      }
    </div>
  </div>
  <mat-card-content>
    <p class="line-clamp-1 mb-2">{{ product().title }}</p>
    <div class="flex justify-between">
      <span>${{product().price}} EGP</span>
      <span
        ><i class="fa-solid fa-star text-yellow-300"></i>
        {{product().ratingsAverage}}</span
      >
    </div>
  </mat-card-content>
  <mat-card-actions>
    <lib-button (clicked)="addToCart(product()._id)" class="w-full"
      >Add to cart</lib-button
    >
  </mat-card-actions>
</mat-card>
