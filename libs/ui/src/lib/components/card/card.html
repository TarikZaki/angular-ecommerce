<div class="card border border-green-500 rounded-md shadow overflow-hidden p-1">
  <div class="cursor-pointer mb-2">
    <div class="card-img">
      <img
        [src]="product().imageCover"
        [alt]="product().title"
        class="w-full rounded-t"
      />
    </div>
    <h4>{{product().category.name}}</h4>
    <p>{{product().title.split(' ', 2).join(' ')}}</p>
    <div class="flex justify-between">
      <span>${{product().price}} EGP</span>
      <span
        ><i class="fa-solid fa-star text-yellow-300"></i>
        {{product().ratingsAverage}}</span
      >
    </div>
  </div>
  <lib-button class="">Add to cart</lib-button>
</div>
