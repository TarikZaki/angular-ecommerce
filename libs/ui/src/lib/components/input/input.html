<mat-form-field class="w-full custom-input">
  <mat-label>{{label()}}</mat-label>
  <input
    matInput
    [type]="typeInput() === 'password' ? (hide() ? 'password' : 'text') : typeInput()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    (input)="onInputChange($event)"
    (blur)="onBlur()"
  />

  @if (hasError) {
  <div class="text-red-600 text-md mt-1">
    {{ ngControl?.control?.errors | errorMessage : label() }}
  </div>
  } @if (typeInput() === 'password') {
  <button mat-icon-button matSuffix (click)="clickEvent($event)" type="button">
    <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
  </button>
  }
</mat-form-field>
