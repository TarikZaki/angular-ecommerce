<section class="section-style">
  <div class="container px-4 sm:px-6 lg:px-8">
    <h2 class="title-style">Popular Products</h2>

    <!-- grid -->
    <div
      class="mt-10 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4"
    >
      @for (product of randomizedProducts() ; track product._id) {
      <lib-product-card [product]="product"></lib-product-card>
      }
    </div>
  </div>
</section>
