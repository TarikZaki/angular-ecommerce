<section class="flex">
  <div class="w-full md:w-2/3">
    <owl-carousel-o [options]="mainOptions">
      @for (img of mainImages; track $index) {
      <ng-template carouselSlide>
        <img [src]="img" class="common" alt="image" />
      </ng-template>
      }
    </owl-carousel-o>
  </div>
  <div class="md:w-1/3">
    <div>
      @for (img of sideImages; track $index) {
      <img [src]="img" class="common" alt="image" />
      }
    </div>
  </div>
</section>
