<section class="flex">
  <div class="w-full md:w-2/3">
    <owl-carousel-o [options]="mainOptions">
      <ng-template carouselSlide>
        <img
          src="images/img1.avif"
          class="w-full h-full object-cover"
          alt="img1"
        />
      </ng-template>
      <ng-template carouselSlide>
        <img
          src="images/img2.avif"
          class="w-full h-full object-cover"
          alt="img2"
        />
      </ng-template>
      <ng-template carouselSlide>
        <img
          src="images/img3.avif"
          class="w-full h-full object-cover"
          alt="img3"
        />
      </ng-template>
      <ng-template carouselSlide>
        <img
          src="images/img4.avif"
          class="w-full h-full object-cover"
          alt="img4"
        />
      </ng-template>
      <ng-template carouselSlide>
        <img
          src="images/img5.avif"
          class="w-full h-full object-cover"
          alt="img5"
        />
      </ng-template>
      <ng-template carouselSlide>
        <img
          src="images/img6.avif"
          class="w-full h-full object-cover"
          alt="img6"
        />
      </ng-template>
    </owl-carousel-o>
  </div>
  <div class="md:w-1/3">
    <div>
      <img
        src="images/img4.avif"
        class="w-full h-full object-cover"
        alt="img2"
      />
      <img
        src="images/img2.avif"
        class="w-full h-full object-cover"
        alt="img2"
      />
    </div>
  </div>
</section>
