<section class="section-style">
  <div class="container px-4 sm:px-6 lg:px-8">
    <h2 class="title-style">Popular Categories</h2>
    <owl-carousel-o [options]="categoriesOptions">
      @for (category of categoryList; track category._id) {
      <ng-template carouselSlide [id]="category._id">
        <div
          class="border border-green-400 h-full rounded-md shadow p-2 sm:p-3 bg-white flex flex-col mx-1 sm:mx-2"
        >
          <img
            class="w-full h-32 sm:h-40 md:h-48 lg:h-52 xl:h-56 object-cover rounded"
            [src]="category.image"
            [alt]="category.slug"
          />
          <h3 class="line-clamp-1">{{category.name}}</h3>
        </div>
      </ng-template>
      }
    </owl-carousel-o>
  </div>
</section>
