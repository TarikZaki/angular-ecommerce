<div class="bg-white rounded-lg shadow p-6 sticky top-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Order Summary</h2>
  <div class="flex justify-between py-3 border-b border-gray-200">
    <span>Price :</span>
    <span class="font-bold"> {{cart()?.totalCartPrice}}</span>
  </div>

  <div class="flex justify-between py-3 border-b border-gray-200">
    <span>Shipping :</span>
    <span class="font-bold text-green-600">Free</span>
  </div>

  <div class="flex justify-between py-3 bg-gray-50 px-4 rounded-lg">
    <span class="text-lg font-bold text-gray-900">Total:</span>
    <span class="text-lg font-bold text-gray-900">
      {{cart()?.totalCartPrice}}</span
    >
    <!-- {{cartDetails.totalCartPrice | currency : "GBP"}} -->
  </div>

  <!-- [routerLink]="['/checkout', cartDetails._id]" -->
  <button
    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 px-6 rounded-lg transition-colors cursor-pointer mb-4"
  >
    Proceed To CheckOut
  </button>
  <div class="text-center text-sm text-gray-600">
    <i class="fas fa-shield-alt text-green-500 mr-1"></i>
    Secure checkout guaranteed
  </div>
</div>
