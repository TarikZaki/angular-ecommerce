<lib-cart-items></lib-cart-items>
@if (cart()?.products) { @for (product of cart()?.products; track product._id) {
<div class="bg-white p-6 shadow rounded-lg mb-4 grid md:grid-cols-12">
  <!-- product img -->
  <div class="md:col-span-3 border border-black rounded-lg">
    <img
      [src]="product.product.imageCover"
      class="w-full h-32 object-contain rounded-lg border"
      alt=""
    />
  </div>
  <!-- product details -->
  <div
    class="md:col-span-9 flex flex-col md:flex-row md:justify-between md:items-center"
  >
    <div class="mx-4 mt-3 md:mt-0">
      <h3 class="font-bold text-lg pb-3">{{product.product.title}}</h3>
      <p class="text-md">{{product.product.title}}</p>
      <lib-product-controls
        [productId]="product.product._id"
        [count]="product.count"
      ></lib-product-controls>
    </div>
    <p class="text-2xl text-green-600 font-bold text-right mt-3 md:mt-0">
      {{product.price}} EGP
    </p>
  </div>
</div>
}@empty {
<div class="bg-white p-6 shadow rounded-lg mb-4 text-center">
  <div class="mx-auto">
    <i class="fas fa-shopping-cart text-6xl text-gray-300 mb-6"></i>
    <h2 class="text-2xl font-semibold text-gray-800 mb-3">
      Your cart is empty
    </h2>
    <p class="text-gray-600 mb-6">
      Looks like you haven't added any items to your cart yet. Start shopping to
      fill it up!
    </p>
    <lib-button class="w-1/3 mx-auto" routerLink="/products"
      ><span class="font-bold text-lg">+ Start Shopping </span></lib-button
    >
  </div>
</div>
}}
